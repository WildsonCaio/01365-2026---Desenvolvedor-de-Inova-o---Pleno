services:
  # --- Backend Services ---
  app:
    build:
      context: ./geotrack
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./geotrack:/app
    ports:
      - "8000:8000"
    env_file:
      - ./geotrack/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:15-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./geotrack/.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build:
      context: ./geotrack
      dockerfile: docker/Dockerfile
    command: celery -A app worker -l info
    volumes:
      - ./geotrack:/app
    env_file:
      - ./geotrack/.env
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./geotrack
      dockerfile: docker/Dockerfile
    command: celery -A app beat -l info
    volumes:
      - ./geotrack:/app
    env_file:
      - ./geotrack/.env
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  # --- Frontend Service ---
  frontend:
    build:
      context: ./geotrack-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - app

volumes:
  postgres_data:
